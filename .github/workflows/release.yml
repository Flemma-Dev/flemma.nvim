name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          title: "Version Packages"
          commit: "chore: version packages"
          version: contrib/scripts/version-packages.sh
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-release:
    name: Update develop to -dev
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          version=$(grep '"version"' package.json | head -1 | sed 's/.*"\([0-9][0-9.]*[0-9]\)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create post-release branch and set -dev version
        run: |
          branch="post-release/v${{ steps.version.outputs.version }}"
          git push origin --delete "$branch" 2>/dev/null || true
          git checkout -b "$branch"
          chmod +x contrib/scripts/sync-version.sh
          contrib/scripts/sync-version.sh --dev
          git add lua/flemma/version.lua
          git commit -m "chore: set version to ${{ steps.version.outputs.version }}-dev for development"
          git push origin "$branch"

      - name: Open PR to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## Summary

          Automated post-release PR. Syncs \`develop\` with \`main\` after the v${version} release and sets the version to \`${version}-dev\` for continued development.

          **Changes from the release:**
          - Version bump in \`package.json\`
          - Updated \`CHANGELOG.md\`
          - Consumed changeset files
          - \`version.lua\` set to \`${version}-dev\`
          EOF
          gh pr create \
            --base develop \
            --head "post-release/v${version}" \
            --title "Post-release: sync develop to v${version}-dev" \
            --body-file "$RUNNER_TEMP/pr-body.md"
