name: Post-Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}

jobs:
  update-develop:
    name: Update develop to -dev
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          version=$(grep '"version"' package.json | head -1 | sed 's/.*"\([0-9][0-9.]*[0-9]\)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"

      - name: Check if release tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "tagged=false" >> "$GITHUB_OUTPUT"
            echo "No tag v${{ steps.version.outputs.version }} found — skipping"
          fi

      - name: Configure git identity
        if: steps.check.outputs.tagged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create post-release branch and set -dev version
        if: steps.check.outputs.tagged == 'true'
        run: |
          branch="post-release/v${{ steps.version.outputs.version }}"
          git push origin --delete "$branch" 2>/dev/null || true
          git checkout -b "$branch"
          chmod +x contrib/scripts/sync-version.sh
          contrib/scripts/sync-version.sh --dev
          git add lua/flemma/version.lua
          git commit -m "chore: set version to ${{ steps.version.outputs.version }}-dev for development"
          git push origin "$branch"

      - name: Open PR to develop
        if: steps.check.outputs.tagged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          cat > "$RUNNER_TEMP/pr-body.md" <<EOF
          ## Summary

          Automated post-release PR. Syncs \`develop\` with \`main\` after the v${version} release and sets the version to \`${version}-dev\` for continued development.

          **Changes from the release:**
          - Version bump in \`package.json\`
          - Updated \`CHANGELOG.md\`
          - Consumed changeset files
          - \`version.lua\` set to \`${version}-dev\`
          EOF
          gh pr create \
            --base develop \
            --head "post-release/v${version}" \
            --title "Post-release: sync develop to v${version}-dev" \
            --body-file "$RUNNER_TEMP/pr-body.md"
